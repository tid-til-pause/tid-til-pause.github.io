<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Skole timer</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

#title{
    font-size:32px;
}

#countdown{
    font-size:70px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>
<body>

<h1 id="title">Loader...</h1>
<div id="countdown">...</div>

<script>
function updateCountdown(){

const now = new Date();

const pause10start = new Date();
pause10start.setHours(9,45,0,0);

const pause10end = new Date();
pause10end.setHours(10,5,0,0);

const pause12start = new Date();
pause12start.setHours(11,35,0,0);

const pause12end = new Date();
pause12end.setHours(12,5,0,0);

let target;
let text;

if(now < pause10start){
    target = pause10start;
    text = "Nedtælling til 10-pausen";
}
else if(now < pause10end){
    target = pause10end;
    text = "Pause – timen starter igen om";
}
else if(now < pause12start){
    target = pause12start;
    text = "Nedtælling til 12-pausen";
}
else if(now < pause12end){
    target = pause12end;
    text = "Pause – timen starter igen om";
}
else{
    document.getElementById("title").textContent = "Skole dagen er slut 🎉";
    document.getElementById("countdown").textContent = "";
    return;
}

document.getElementById("title").textContent = text;

const diff = target - now;

const hours = Math.floor(diff/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").textContent =
`${hours}t ${minutes}m ${seconds}s`;

}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
